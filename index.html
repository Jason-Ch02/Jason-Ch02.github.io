<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>欢迎来到我的个人主页</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", sans-serif;
    }

    /* 整屏居中 */
    body {
      background-color: #f0f4fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 设计欢迎卡片 */
    .welcome-card {
      background: white;
      padding: 60px 50px;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      text-align: center;
      max-width: 700px;
    }

    .welcome-card h1 {
      font-size: 28px;
      color: #222;
      margin-bottom: 20px;
    }

    .welcome-card p {
      font-size: 16px;
      color: #555;
      line-height: 1.8;
      margin-bottom: 40px;
    }

    /* 按钮样式 */
    .enter-btn {
      padding: 14px 36px;
      background-color: #3b82f6;
      color: rgb(240, 172, 236);
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .enter-btn:hover {
      background-color: #2563eb;
    }
  </style>
</head>

<body>
  <div class="welcome-card">
    <h1>欢迎来到我的个人主页</h1>
    <p>
      这个网站是我从零开始学习前端后制作的第一个个人作品，
      目的是更清晰、更完整地展示我的学习经历、编程项目、算法练习记录以及个人成长轨迹。
      希望通过这个页面，更直观地展现我在计算机方向上的努力与积累同时表达我对编程的热情。
    </p>

   <!-- 点击按钮跳转到主页-->
<button class="enter-btn" onclick="location.href='content.html'">
  进入主页 →
</button>
  </div>
</body>
</html>
